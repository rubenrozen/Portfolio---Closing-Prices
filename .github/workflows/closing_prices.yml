name: Closing Prices

on:
  schedule:
    # 23h UTC — après la clôture NYSE (même en EST/hiver) et bien avant
    # l'ouverture de Tokyo (00h UTC), pour éviter les bougies partielles.
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  run:
    name: Fetch & write closing prices
    runs-on: ubuntu-latest
    timeout-minutes: 30   # 2 passes + 15 min de sleep → large marge

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: 1st pass — fetch & write closing prices
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_IDS: ${{ secrets.SHEET_IDS }}
        run: python closing_prices.py

      - name: Wait 15 minutes
        run: sleep 900

      - name: 2nd pass — retry gaps (fill-only, no overwrite)
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_IDS: ${{ secrets.SHEET_IDS }}
        run: python closing_prices.py
